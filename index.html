<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Login Page</title>
    <link rel="stylesheet" href="login_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="glass-container">
        
        <div class="form-body">
            <div class="left-section">
                <h2>Login</h2>
                <form action="#">
                    <div class="input-group">
                        <input type="text" placeholder="Username" id="username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Password" id="passwords" required>
                    </div>
                    
                    <div class="forgot-password">
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn" onclick="display()">Sign In</button>
                </form>
            </div>

            <div class="separator"></div>

            <div class="right-section">
                <h2>Or connect with</h2>
                
                <a href="#" class="social-btn google">
                    <i class="fab fa-google"></i> Sign in with Google
                </a>
                
                <a href="#" class="social-btn microsoft">
                    <i class="fab fa-microsoft"></i> Sign in with Microsoft
                </a>
                
                <a href="#" class="social-btn github">
                    <i class="fab fa-github"></i> Sign in with GitHub
                </a>
            </div>
        </div>

        <div class="form-footer">
            <p>Don't have an account? <a href="Register.html">Sign up here</a></p>
        </div>

    </div>

    <script>
        function display() {
            const usernames = document.getElementById('username').value;
            const password = document.getElementById('passwords').value;
            alert("Input Username: " + usernames + "\nInput Password: " + password);
        }
    </script>
</body>
</html>
